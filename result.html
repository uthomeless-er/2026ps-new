<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>途中経過 — Premier Series 26-27予想企画</title>
    <meta name="description" content="Premier Series 26-27 予想企画。シーズン結果・払い戻し情報。">
    <meta property="og:type" content="website">
    <meta property="og:title" content="途中経過 — Premier Series 26-27 予想企画">
    <meta property="og:description" content="シーズン途中経過・最終結果">
    <meta property="og:image" content="https://uthomeless-er.github.io/2026ps-new/assets/images/ogp.png">
    <meta property="og:url" content="https://uthomeless-er.github.io/2026ps-new/result.html">
    <meta property="og:site_name" content="Premier Series 26-27 予想企画">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .result-wrap { max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }

        /* ステータスバッジ */
        .status-badge {
            display: inline-block; padding: 4px 16px; border-radius: 20px;
            font-size: .8rem; font-weight: 700; margin-bottom: 16px;
        }
        .status-badge.interim { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
        .status-badge.final   { background: #d4edda; color: #155724; border: 1px solid #28a745; }

        /* 着順表 */
        .ranking-table-wrap { overflow-x: auto; margin-bottom: 32px; }
        .ranking-table {
            width: 100%; border-collapse: collapse; background: #fff;
            border: 1px solid #dde3ed; border-radius: 8px; overflow: hidden;
            white-space: nowrap;
        }
        .ranking-table th {
            background: #0a1628; color: #fff;
            padding: 10px 14px; font-size: .83rem; text-align: center;
        }
        .ranking-table td {
            padding: 11px 14px; border-bottom: 1px solid #eef0f4;
            font-size: .9rem; text-align: center; vertical-align: middle;
        }
        .ranking-table tr:last-child td { border-bottom: none; }
        .rank-pos { font-weight: 900; font-size: 1rem; color: #0a1628; }
        .frame-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 26px; height: 26px; border-radius: 5px;
            font-size: .8rem; font-weight: 900;
        }
        .team-logo-sm { width: 32px; height: 32px; object-fit: contain; vertical-align: middle; }
        .team-name-cell { text-align: left; font-weight: 700; }
        .points-cell { font-weight: 900; color: #1a4fd6; font-size: 1rem; }

        /* 払い戻し表（スクリーンショット参考：2列グリッド） */
        .payout-wrap { margin-bottom: 28px; }
        .payout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            border: 1px solid #dde3ed;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }
        .payout-section-title {
            grid-column: 1 / -1;
            background: #f5f7fa;
            border-bottom: 1px solid #dde3ed;
            padding: 8px 14px;
            font-size: .78rem;
            font-weight: 700;
            color: #5a6a82;
        }
        .payout-row {
            display: flex;
            align-items: center;
            padding: 9px 14px;
            border-bottom: 1px solid #eef0f4;
            gap: 10px;
        }
        .payout-row:nth-child(even) { border-left: 1px solid #eef0f4; }
        .payout-row:last-child, .payout-row:nth-last-child(2):nth-child(odd) { border-bottom: none; }
        .payout-type { font-weight: 700; font-size: .82rem; color: #0a1628; min-width: 44px; flex-shrink: 0; }
        .payout-comb { font-family: monospace; color: #1a4fd6; font-weight: 700; font-size: .88rem; flex: 1; }
        .payout-odds { font-weight: 900; color: #d00; font-size: .95rem; flex-shrink: 0; white-space: nowrap; }

        @media (max-width: 767px) {
            .result-wrap { padding: 0 10px 48px; }
            .ranking-table th, .ranking-table td { padding: 9px 10px; font-size: .82rem; }
            .team-logo-sm { width: 26px; height: 26px; }
            .payout-grid { grid-template-columns: 1fr; }
            .payout-row:nth-child(even) { border-left: none; }
        }
    </style>
</head>
<body>
<div id="site-header"></div>
<div id="page-nav"></div>
<div id="countdown-bar-mount"></div>

<div class="result-wrap">
    <div class="section-title">途中経過</div>
    <div id="result-content"><div style="text-align:center;padding:40px;color:#888;">読み込み中...</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/common.js"></script>
<script>
const FRAME_BG = {1:'#f0f0f0',2:'#111',3:'#cc2200',4:'#1a4fd6',5:'#d4a000',6:'#1a7a3a',7:'#d06000',8:'#c0357a'};
const FRAME_FG = {1:'#111',2:'#fff',3:'#fff',4:'#fff',5:'#111',6:'#fff',7:'#fff',8:'#fff'};

let teamsData = [];

document.addEventListener('DOMContentLoaded', async () => {
    renderLayout();
    try {
        const [teams, result] = await Promise.all([
            loadJSON('data/teams.json'),
            loadJSON('data/result.json'),
        ]);
        teamsData = teams;
        render(result);
    } catch(e) {
        console.error(e);
        document.getElementById('result-content').innerHTML =
            '<div style="text-align:center;padding:40px;color:#888;">データの読み込みに失敗しました。</div>';
    }
});

function team(id) { return teamsData.find(t => t.id === id) || {}; }

function render(result) {
    const el = document.getElementById('result-content');
    const { status, teams, confirmed_odds } = result;
    const isFinal = status === 'final';

    // 点数で降順ソート、同点は同順位
    const sorted = [...teams].sort((a, b) => b.points - a.points);
    let rank = 1;
    const ranked = sorted.map((item, i) => {
        if (i > 0 && item.points < sorted[i - 1].points) rank = i + 1;
        return { ...item, rank };
    });

    const badge = isFinal
        ? '<span class="status-badge final">最終結果</span>'
        : '<span class="status-badge interim">途中経過</span>';

    // 着順表
    const rankRows = ranked.map(item => {
        const t  = team(item.id);
        const bg = FRAME_BG[item.id] || '#999';
        const fg = FRAME_FG[item.id] || '#fff';
        return `<tr>
            <td class="rank-pos">${item.rank}</td>
            <td><span class="frame-badge" style="background:${bg};color:${fg}">${item.id}</span></td>
            <td><img class="team-logo-sm" src="${t.logo||''}" alt="${t.tag||''}" onerror="this.style.display='none'"></td>
            <td class="team-name-cell">${t.name || String(item.id)}</td>
            <td class="points-cell">${item.points} pt</td>
        </tr>`;
    }).join('');

    // 払い戻し（最終結果のみ）
    const payoutHtml = isFinal && confirmed_odds
        ? buildPayoutHtml(confirmed_odds, ranked)
        : '';

    el.innerHTML = `
    ${badge}
    <div class="ranking-table-wrap">
        <table class="ranking-table">
            <thead><tr><th>順位</th><th>枠</th><th>ロゴ</th><th>チーム名</th><th>獲得pt</th></tr></thead>
            <tbody>${rankRows}</tbody>
        </table>
    </div>
    ${payoutHtml}`;
}

function buildPayoutHtml(confirmed, ranked) {
    const r1 = ranked[0].id;
    const r2 = ranked[1] ? ranked[1].id : null;
    const r3 = ranked[2] ? ranked[2].id : null;
    const t  = id => team(id).tag || String(id);
    const sp = (a,b) => [a,b].sort((x,y)=>x-y).join('-');

    function val(type, key) {
        const v = (confirmed[type] || {})[key] || confirmed[type];
        return v != null ? String(v) : null;
    }

    // 左列：単勝・複勝、右列：ワイド・各連
    const left = [];
    const right = [];

    // 単勝
    const w = val('win', String(r1));
    if (w) left.push({ type:'単勝', comb:`${r1}（${t(r1)}）`, odds:w });

    // 複勝
    [r1, r2, r3].filter(Boolean).forEach(id => {
        const v = val('place', String(id));
        if (v) left.push({ type:'複勝', comb:`${id}（${t(id)}）`, odds:v });
    });

    // ワイド
    if (r2) {
        [[r1,r2],[r1,r3],[r2,r3]].filter(([a,b])=>a&&b).forEach(([a,b]) => {
            const v = val('wide', sp(a,b));
            if (v) right.push({ type:'ワイド', comb:sp(a,b), odds:v });
        });
    }

    // 2連複・2連単・3連複・3連単
    if (r1 && r2) {
        const q = val('quinella', sp(r1,r2));
        if (q) right.push({ type:'2連複', comb:sp(r1,r2), odds:q });
        const e = val('exacta', `${r1}-${r2}`);
        if (e) right.push({ type:'2連単', comb:`${r1}-${r2}`, odds:e });
    }
    if (r1 && r2 && r3) {
        const tr = val('trio', [r1,r2,r3].sort((a,b)=>a-b).join('-'));
        if (tr) right.push({ type:'3連複', comb:[r1,r2,r3].sort((a,b)=>a-b).join('-'), odds:tr });
        const tf = val('trifecta', `${r1}-${r2}-${r3}`);
        if (tf) right.push({ type:'3連単', comb:`${r1}-${r2}-${r3}`, odds:tf });
    }

    const maxLen = Math.max(left.length, right.length);
    const rows = [];
    for (let i = 0; i < maxLen; i++) {
        const l = left[i]  || null;
        const r = right[i] || null;
        rows.push(`
        <div class="payout-row">
            ${l ? `<span class="payout-type">${l.type}</span><span class="payout-comb">${l.comb}</span><span class="payout-odds">${l.odds}</span>` : '<span style="flex:1"></span>'}
        </div>
        <div class="payout-row">
            ${r ? `<span class="payout-type">${r.type}</span><span class="payout-comb">${r.comb}</span><span class="payout-odds">${r.odds}</span>` : '<span style="flex:1"></span>'}
        </div>`);
    }

    return `
    <div class="payout-wrap">
        <div class="section-title" style="margin-bottom:12px;">払い戻し</div>
        <div class="payout-grid">
            ${rows.join('')}
        </div>
    </div>`;
}
</script>
</body>
</html>
