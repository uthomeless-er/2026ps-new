<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>結果 — Premier Series 26-27予想企画</title>
    <meta name="description" content="Premier Series 26-27 予想企画。シーズン結果・払い戻し情報。">
    <meta property="og:type" content="website">
    <meta property="og:title" content="結果 — Premier Series 26-27 予想企画">
    <meta property="og:description" content="シーズン結果・払い戻し情報">
    <meta property="og:image" content="https://uthomeless-er.github.io/2026ps-new/assets/images/ogp.png">
    <meta property="og:url" content="https://uthomeless-er.github.io/2026ps-new/result.html">
    <meta property="og:site_name" content="Premier Series 26-27 予想企画">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .result-wrap { max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }

        /* 待機中 */
        .result-waiting {
            text-align: center; padding: 80px 20px;
            background: #fff; border: 1px solid #dde3ed;
            border-radius: 12px; margin-top: 8px;
        }
        .result-waiting .w-icon { font-size: 3rem; margin-bottom: 16px; }
        .result-waiting h2 { font-size: 1.2rem; color: #0a1628; margin: 0 0 10px; }
        .result-waiting p  { font-size: .9rem; color: #5a6a82; line-height: 1.8; margin: 0; }

        /* ステータスバッジ */
        .status-badge {
            display: inline-block; padding: 4px 14px; border-radius: 20px;
            font-size: .78rem; font-weight: 700; margin-bottom: 16px;
        }
        .status-badge.interim { background:#fff3cd; color:#856404; border:1px solid #ffc107; }
        .status-badge.final   { background:#d4edda; color:#155724; border:1px solid #28a745; }

        /* 着順表 */
        .ranking-table-wrap { overflow-x: auto; margin-bottom: 28px; }
        .ranking-table {
            width: 100%; border-collapse: collapse;
            background: #fff; border: 1px solid #dde3ed;
            border-radius: 8px; overflow: hidden; white-space: nowrap;
        }
        .ranking-table th {
            background: #0a1628; color: #fff;
            padding: 9px 12px; font-size: .82rem; text-align: center;
        }
        .ranking-table td {
            padding: 10px 12px; border-bottom: 1px solid #eef0f4;
            font-size: .88rem; text-align: center; vertical-align: middle;
        }
        .ranking-table tr:last-child td { border-bottom: none; }
        .ranking-table tr:nth-child(1) td { background: #fffbe6; }
        .ranking-table tr:nth-child(2) td { background: #f8f8f8; }
        .ranking-table tr:nth-child(3) td { background: #fff5ee; }
        .rank-pos { font-weight: 900; font-size: 1.05rem; }
        .rank-pos.p1 { color: #c09000; }
        .rank-pos.p2 { color: #666; }
        .rank-pos.p3 { color: #a06030; }
        .frame-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 26px; height: 26px; border-radius: 5px;
            font-size: .8rem; font-weight: 900;
        }
        .team-logo-sm { width: 32px; height: 32px; object-fit: contain; vertical-align: middle; }
        .team-name-cell { text-align: left; font-weight: 700; padding-left: 8px !important; }
        .medal { font-size: 1.1rem; }

        /* 注意書き */
        .note-interim {
            background: #fff3cd; border: 1px solid #ffc107; border-radius: 6px;
            padding: 10px 14px; font-size: .82rem; color: #856404;
            margin-bottom: 20px; line-height: 1.7;
        }

        /* 払い戻し表 */
        .payout-table-wrap { overflow-x: auto; margin-bottom: 28px; }
        .payout-table {
            width: 100%; border-collapse: collapse; background: #fff;
            border: 1px solid #dde3ed; border-radius: 8px; overflow: hidden;
        }
        .payout-table th {
            background: #0a1628; color: #fff;
            padding: 9px 14px; font-size: .82rem; text-align: center;
        }
        .payout-table td { padding: 9px 14px; border-bottom: 1px solid #eef0f4; font-size: .88rem; }
        .payout-table tr:last-child td { border-bottom: none; }
        .payout-table .col-type { font-weight: 700; text-align: center; white-space: nowrap; }
        .payout-table .col-comb { font-family: monospace; color: #1a4fd6; font-weight: 700; }
        .payout-table .col-odds { text-align: right; font-weight: 700; color: #d00; white-space: nowrap; }
        .payout-table .estimated { color: #888; font-size: .8rem; font-weight: 400; }
        .payout-table .confirmed-val { color: #007d43; }

        @media (max-width: 767px) {
            .result-wrap { padding: 0 10px 48px; }
            .ranking-table th, .ranking-table td { padding: 8px 8px; font-size: .8rem; }
            .team-logo-sm { width: 24px; height: 24px; }
        }
    </style>
</head>
<body>
<div id="site-header"></div>
<div id="page-nav"></div>
<div id="countdown-bar-mount"></div>

<div class="result-wrap">
    <div class="section-title">結果</div>
    <div id="result-content"><div style="text-align:center;padding:40px;color:#888;">読み込み中...</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/common.js"></script>
<script>
const FRAME_BG = {1:'#f0f0f0',2:'#111',3:'#cc2200',4:'#1a4fd6',5:'#d4a000',6:'#1a7a3a',7:'#d06000',8:'#c0357a'};
const FRAME_FG = {1:'#111',2:'#fff',3:'#fff',4:'#fff',5:'#111',6:'#fff',7:'#fff',8:'#fff'};

let teamsData = [];
let oddsData  = {};

document.addEventListener('DOMContentLoaded', async () => {
    renderLayout();
    try {
        const [teams, odds, result] = await Promise.all([
            loadJSON('data/teams.json'),
            loadJSON('data/odds.json'),
            loadJSON('data/result.json'),
        ]);
        teamsData = teams;
        oddsData  = odds;
        render(result);
    } catch(e) {
        console.error(e);
        document.getElementById('result-content').innerHTML =
            '<div style="text-align:center;padding:40px;color:#888;">データの読み込みに失敗しました。</div>';
    }
});

function team(id) { return teamsData.find(t => t.id === id) || {}; }

function getOddsMidpoint(valStr) {
    if (!valStr || valStr === '---') return null;
    const s = String(valStr);
    if (s.includes(' - ')) {
        const [lo, hi] = s.split(' - ').map(parseFloat);
        return Math.floor(((lo + hi) / 2) * 10) / 10;
    }
    const v = parseFloat(s);
    return isNaN(v) ? null : v;
}

function render(result) {
    const el = document.getElementById('result-content');
    const { status, ranks, confirmed_odds } = result;

    // 待機中
    if (status === 'waiting' || !ranks || !ranks[0]) {
        el.innerHTML = `
        <div class="result-waiting">
            <div class="w-icon">⏳</div>
            <h2>結果が出るまでお待ちください</h2>
            <p>Premier Seriesシーズン終了後に結果を発表します。<br>しばらくお待ちください。</p>
        </div>`;
        return;
    }

    const isFinal = status === 'final';
    const medals  = ['🥇','🥈','🥉','','','','',''];
    const posCls  = ['p1','p2','p3','','','','',''];

    // 着順表
    const rankRows = ranks.map((id, i) => {
        if (!id) return '';
        const t  = team(id);
        const bg = FRAME_BG[id] || '#999';
        const fg = FRAME_FG[id] || '#fff';
        return `<tr>
            <td class="rank-pos ${posCls[i]}">${medals[i]}${i + 1}</td>
            <td><span class="frame-badge" style="background:${bg};color:${fg}">${id}</span></td>
            <td><img class="team-logo-sm" src="${t.logo||''}" alt="${t.tag||''}" onerror="this.style.display='none'"></td>
            <td class="team-name-cell">${t.name || String(id)}</td>
            <td style="color:#5a6a82;font-size:.82rem;">${t.tag||''}</td>
        </tr>`;
    }).join('');

    // 払い戻し
    const payoutRows = buildPayoutRows(ranks, isFinal, confirmed_odds);

    const badge = isFinal
        ? '<span class="status-badge final">✅ 最終結果</span>'
        : '<span class="status-badge interim">📊 途中経過（推定配当）</span>';

    const note = isFinal ? '' : `
    <div class="note-interim">
        ⚠️ 現在表示されているオッズは推定値です。複勝・ワイドなどはオッズの中央値を使用しています。最終的な払い戻し額はシーズン終了後に確定します。
    </div>`;

    el.innerHTML = `
    ${badge}
    <div class="ranking-table-wrap">
        <table class="ranking-table">
            <thead><tr><th>着順</th><th>枠</th><th>ロゴ</th><th>チーム名</th><th>略称</th></tr></thead>
            <tbody>${rankRows}</tbody>
        </table>
    </div>
    ${note}
    <div class="section-title" style="margin-bottom:12px;">払い戻し</div>
    <div class="payout-table-wrap">
        <table class="payout-table">
            <thead><tr><th>券種</th><th>的中組合せ</th><th>オッズ</th></tr></thead>
            <tbody>${payoutRows}</tbody>
        </table>
    </div>`;
}

function buildPayoutRows(ranks, isFinal, confirmed) {
    const r1 = ranks[0], r2 = ranks[1], r3 = ranks[2];
    if (!r1 || !r2 || !r3) return '<tr><td colspan="3" style="text-align:center;color:#888;">上位3チーム確定後に表示されます</td></tr>';

    const sp = (a,b) => [a,b].sort((x,y)=>x-y).join('-');

    function getOdds(type, key) {
        if (isFinal && confirmed && confirmed[type] !== undefined) {
            const raw = typeof confirmed[type] === 'object' ? confirmed[type][key] : confirmed[type];
            if (raw == null) return null;
            return { val: Number(raw).toFixed(1), cls: 'confirmed-val', tag: '確定' };
        }
        const raw = (oddsData[type] || {})[key];
        if (!raw) return null;
        const mid = getOddsMidpoint(raw);
        return mid ? { val: mid.toFixed(1), cls: '', tag: '推定' } : null;
    }

    const defs = [
        { type:'win',      key:String(r1),                     label:'単勝',  comb:`${r1}` },
        { type:'place',    key:String(r1),                     label:'複勝',  comb:`${r1}` },
        { type:'place',    key:String(r2),                     label:'複勝',  comb:`${r2}` },
        { type:'place',    key:String(r3),                     label:'複勝',  comb:`${r3}` },
        { type:'wide',     key:sp(r1,r2),                      label:'ワイド', comb:sp(r1,r2) },
        { type:'wide',     key:sp(r1,r3),                      label:'ワイド', comb:sp(r1,r3) },
        { type:'wide',     key:sp(r2,r3),                      label:'ワイド', comb:sp(r2,r3) },
        { type:'quinella', key:sp(r1,r2),                      label:'2連複',  comb:sp(r1,r2) },
        { type:'exacta',   key:`${r1}-${r2}`,                  label:'2連単',  comb:`${r1}-${r2}` },
        { type:'trio',     key:[r1,r2,r3].sort((a,b)=>a-b).join('-'), label:'3連複', comb:[r1,r2,r3].sort((a,b)=>a-b).join('-') },
        { type:'trifecta', key:`${r1}-${r2}-${r3}`,            label:'3連単',  comb:`${r1}-${r2}-${r3}` },
    ];

    const rows = [];
    defs.forEach(d => {
        const o = getOdds(d.type, d.key);
        if (!o) return;
        rows.push(`<tr>
            <td class="col-type">${d.label}</td>
            <td class="col-comb">${d.comb}</td>
            <td class="col-odds"><span class="${o.cls}">${o.val}</span><span class="estimated"> (${o.tag})</span></td>
        </tr>`);
    });
    return rows.join('') || '<tr><td colspan="3" style="text-align:center;color:#888;">データなし</td></tr>';
}
</script>
</body>
</html>
