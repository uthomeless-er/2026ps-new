<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予想家の見解 — Premier Series 26-27予想企画</title>
    <meta name="description" content="Premier Series 26-27 予想企画。認定予想家による予想・見解一覧。">
    <meta property="og:type" content="website">
    <meta property="og:title" content="予想家の見解 — Premier Series 26-27 予想企画">
    <meta property="og:description" content="認定予想家による予想・見解一覧">
    <meta property="og:image" content="https://uthomeless-test.github.io/2026ps-new/assets/images/ogp.png">
    <meta property="og:url" content="https://uthomeless-test.github.io/2026ps-new/predictions.html">
    <meta property="og:site_name" content="Premier Series 26-27 予想企画">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .pred-wrap { max-width: 860px; margin: 0 auto; padding: 0 20px 60px; }
        .pred-intro { font-size: .88rem; color: #5a6a82; line-height: 1.8; margin-bottom: 28px; }

        /* ── カード全体 ── */
        .fc-card {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 0;
            border: 1px solid #dde3ed;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 28px;
            background: #fff;
            box-shadow: 0 2px 10px rgba(0,0,0,.07);
        }
        /* 偶数カードは左右反転 */
        .fc-card.reverse {
            grid-template-columns: 2fr 1fr;
        }
        .fc-card.reverse .fc-profile { order: 2; }
        .fc-card.reverse .fc-main    { order: 1; }

        /* ── 左パネル（プロフィール） ── */
        .fc-profile {
            background: linear-gradient(160deg, #0a1628 0%, #1a2d4a 100%);
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 10px;
        }
        .fc-avatar-wrap { position: relative; }
        .fc-avatar {
            width: 90px; height: 90px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,.25);
            object-fit: cover;
            background: #1a4fd6;
        }
        .fc-badge {
            position: absolute; bottom: -4px; right: -4px;
            background: #1a4fd6; color: #fff;
            font-size: .62rem; font-weight: 700;
            padding: 2px 7px; border-radius: 10px;
            white-space: nowrap;
        }
        .fc-name { font-size: 1.05rem; font-weight: 900; color: #fff; margin: 0; }
        .fc-title { font-size: .72rem; color: rgba(255,255,255,.55); }
        .fc-desc { font-size: .75rem; color: rgba(255,255,255,.7); line-height: 1.6; }
        .fc-stats {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            width: 100%; margin-top: 4px;
        }
        .fc-stat {
            background: rgba(255,255,255,.07);
            border-radius: 6px; padding: 8px 6px; text-align: center;
        }
        .fc-stat-label { font-size: .62rem; color: rgba(255,255,255,.5); margin-bottom: 3px; }
        .fc-stat-value { font-size: 1.1rem; font-weight: 900; color: #5b9aff; }

        /* ── 右パネル（予想本文） ── */
        .fc-main { padding: 24px 24px 20px; display: flex; flex-direction: column; gap: 12px; }
        .fc-pred-title {
            font-size: 1rem; font-weight: 900; color: #0a1628;
            line-height: 1.4; margin: 0;
            border-left: 4px solid #1a4fd6;
            padding-left: 12px;
        }
        .fc-honmei-row { display: flex; align-items: center; gap: 10px; }
        .fc-honmei-label { font-size: .72rem; color: #5a6a82; }
        .fc-honmei-chip {
            display: inline-flex; align-items: center; gap: 6px;
            background: #fff9c4; border: 1.5px solid #f5d000;
            border-radius: 6px; padding: 4px 12px;
            font-size: .84rem; font-weight: 700; color: #7a5000;
        }
        .fc-honmei-chip .hm-sym { font-size: 1rem; }
        .fc-body {
            font-size: .86rem; color: #333;
            line-height: 1.85; flex: 1;
        }
        .fc-bets {
            background: #f0f4ff; border-radius: 6px;
            padding: 10px 14px; font-size: .82rem;
            color: #1a4fd6; font-weight: 700;
            line-height: 1.7; font-family: monospace;
            white-space: pre-wrap;
        }
        .fc-bets-label {
            font-size: .7rem; color: #5a6a82;
            font-weight: 400; font-family: inherit;
            margin-bottom: 3px; display: block;
        }

        /* ── 読み込み中・空状態 ── */
        .pred-msg { text-align: center; padding: 60px 20px; color: #8a9ab2; font-size: .9rem; }

        /* ── SP対応 ── */
        @media (max-width: 767px) {
            .pred-wrap { padding: 0 10px 48px; }
            .fc-card, .fc-card.reverse {
                grid-template-columns: 1fr;
            }
            .fc-card.reverse .fc-profile { order: 1; }
            .fc-card.reverse .fc-main    { order: 2; }
            .fc-profile { flex-direction: row; text-align: left; padding: 16px; gap: 14px; flex-wrap: wrap; }
            .fc-avatar { width: 64px; height: 64px; flex-shrink: 0; }
            .fc-name { font-size: .95rem; }
            .fc-stats { grid-template-columns: repeat(2, 1fr); }
            .fc-main { padding: 16px; }
            .fc-pred-title { font-size: .92rem; }
        }
    </style>
</head>
<body>
<div id="site-header"></div>
<div id="page-nav"></div>
<div id="countdown-bar-mount"></div>

<div class="pred-wrap">
    <div class="section-title">予想家の見解</div>
    <p class="pred-intro">認定予想家による公式見解です。各予想家の分析・本命・買い目をご参照ください。</p>
    <div id="fc-list"><div class="pred-msg">読み込み中...</div></div>
</div>

<div id="site-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/common.js"></script>
<script>
const TEAM_TAGS = {
    1:'CR', 2:'ZETA', 3:'DFM', 4:'VRL', 5:'MRG', 6:'RC', 7:'RDL', 8:'LVH'
};
const TEAM_NAMES = {
    1:'Crazy Raccoon', 2:'ZETA DIVISION', 3:'DetonatioN FocusMe', 4:'VARREL',
    5:'MURASH GAMING', 6:'REJECT', 7:'RIDDLE', 8:'レバンガ北海道'
};

document.addEventListener('DOMContentLoaded', async () => {
    renderLayout();
    try {
        const forecasters = await loadJSON('data/forecasters.json');
        renderForecasters(forecasters);
    } catch(e) {
        console.error(e);
        document.getElementById('fc-list').innerHTML =
            '<div class="pred-msg">データの読み込みに失敗しました。</div>';
    }
});

function renderForecasters(list) {
    if (!list.length) {
        document.getElementById('fc-list').innerHTML =
            '<div class="pred-msg">現在公開中の予想はありません。</div>';
        return;
    }

    document.getElementById('fc-list').innerHTML = list.map((fc, i) => {
        const isReverse = i % 2 === 1;
        const honmeiTeam = fc.prediction.honmei;
        const honmeiTag  = TEAM_TAGS[honmeiTeam]  || String(honmeiTeam);
        const honmeiName = TEAM_NAMES[honmeiTeam] || String(honmeiTeam);

        return `
        <div class="fc-card${isReverse ? ' reverse' : ''}">
            <div class="fc-profile">
                <div class="fc-avatar-wrap">
                    <img class="fc-avatar" src="${escHtml(fc.avatar)}"
                         alt="${escHtml(fc.name)}"
                         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22120%22><rect width=%22120%22 height=%22120%22 rx=%2260%22 fill=%22%231a4fd6%22/><text x=%2260%22 y=%2276%22 text-anchor=%22middle%22 font-size=%2252%22 fill=%22white%22>${escHtml(fc.name.charAt(0))}</text></svg>'">
                    <span class="fc-badge">${escHtml(fc.badge || '')}</span>
                </div>
                <div>
                    <div class="fc-name">${escHtml(fc.name)}</div>
                    <div class="fc-title">${escHtml(fc.title || '')}</div>
                </div>
                <div class="fc-desc">${escHtml(fc.description || '')}</div>
                ${fc.stats ? `
                <div class="fc-stats">
                    <div class="fc-stat">
                        <div class="fc-stat-label">${escHtml(fc.stats.label1)}</div>
                        <div class="fc-stat-value">${escHtml(fc.stats.value1)}</div>
                    </div>
                    <div class="fc-stat">
                        <div class="fc-stat-label">${escHtml(fc.stats.label2)}</div>
                        <div class="fc-stat-value">${escHtml(fc.stats.value2)}</div>
                    </div>
                </div>` : ''}
            </div>
            <div class="fc-main">
                <p class="fc-pred-title">${escHtml(fc.prediction.title)}</p>
                <div class="fc-honmei-row">
                    <span class="fc-honmei-label">◎ 本命</span>
                    <span class="fc-honmei-chip">
                        <span class="hm-sym">◎</span>
                        ${escHtml(honmeiTag)} ${escHtml(honmeiName)}
                    </span>
                </div>
                <p class="fc-body">${escHtml(fc.prediction.body).replace(/\n/g,'<br>')}</p>
                ${fc.prediction.bets ? `
                <div class="fc-bets">
                    <span class="fc-bets-label">買い目</span>${escHtml(fc.prediction.bets)}
                </div>` : ''}
            </div>
        </div>`;
    }).join('');
}

function escHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
    );
}
</script>
</body>
</html>
