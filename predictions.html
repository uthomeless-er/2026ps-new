<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予想家の見解 — Premier Series 26-27予想企画</title>
    <meta name="description" content="Premier Series 26-27 予想企画。認定予想家による予想・見解一覧。">
    <meta property="og:type" content="website">
    <meta property="og:title" content="予想家の見解 — Premier Series 26-27 予想企画">
    <meta property="og:description" content="認定予想家による予想・見解一覧">
    <meta property="og:image" content="https://uthomeless-test.github.io/2026ps-new/assets/images/ogp.png">
    <meta property="og:url" content="https://uthomeless-test.github.io/2026ps-new/predictions.html">
    <meta property="og:site_name" content="Premier Series 26-27 予想企画">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .pred-wrap { max-width: 860px; margin: 0 auto; padding: 0 20px 60px; }
        .pred-intro { font-size: .88rem; color: #5a6a82; line-height: 1.8; margin-bottom: 28px; }

        /* ── カード ── */
        .fc-card {
            display: grid;
            grid-template-columns: 200px 1fr;
            border: 1px solid #dde3ed;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 28px;
            background: #fff;
            box-shadow: 0 2px 10px rgba(0,0,0,.07);
        }
        .fc-card.reverse {
            grid-template-columns: 1fr 200px;
        }
        .fc-card.reverse .fc-profile { order: 2; }
        .fc-card.reverse .fc-main    { order: 1; }

        /* ── プロフィールパネル ── */
        .fc-profile {
            background: linear-gradient(160deg, #0a1628 0%, #1a2d4a 100%);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 8px;
            justify-content: center;
        }
        .fc-avatar-wrap { position: relative; margin-bottom: 4px; }
        .fc-avatar {
            width: 84px; height: 84px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,.2);
            object-fit: cover;
            display: block;
        }
        .fc-badge {
            position: absolute; bottom: -4px; right: -4px;
            background: #1a4fd6; color: #fff;
            font-size: .6rem; font-weight: 700;
            padding: 2px 7px; border-radius: 10px;
            white-space: nowrap;
        }
        .fc-name  { font-size: 1rem; font-weight: 900; color: #fff; margin: 0; line-height: 1.3; }
        .fc-title-sub { font-size: .7rem; color: rgba(255,255,255,.5); }
        .fc-desc  { font-size: .73rem; color: rgba(255,255,255,.7); line-height: 1.6; text-align: left; width: 100%; }

        /* リンクボタン */
        .fc-links { display: flex; flex-direction: column; gap: 6px; width: 100%; margin-top: 4px; }
        .fc-link-btn {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 6px 10px; border-radius: 6px; text-decoration: none;
            font-size: .75rem; font-weight: 700; transition: opacity .15s;
            width: 100%; box-sizing: border-box;
        }
        .fc-link-btn:hover { opacity: .8; }
        .fc-link-btn.type-x    { background: #000; color: #fff; }
        .fc-link-btn.type-note { background: #41c9b4; color: #fff; }
        .fc-link-btn.type-other { background: rgba(255,255,255,.15); color: #fff; }
        .fc-link-icon { font-size: .9rem; }

        /* ── 見解パネル ── */
        .fc-main { padding: 22px 22px 16px; display: flex; flex-direction: column; gap: 10px; }

        .fc-pred-title {
            font-size: .98rem; font-weight: 900; color: #0a1628;
            line-height: 1.4; margin: 0;
            border-left: 4px solid #1a4fd6;
            padding-left: 12px;
        }

        /* 本命 */
        .fc-honmei-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .fc-honmei-label {
            font-size: .9rem; font-weight: 900; color: #d00;
        }
        .fc-honmei-chip {
            display: inline-flex; align-items: center; gap: 8px;
            border-radius: 6px; padding: 4px 0;
        }
        .fc-honmei-logo {
            width: 32px; height: 32px; object-fit: contain;
            vertical-align: middle;
        }
        .fc-honmei-name { font-size: 1.05rem; font-weight: 900; color: #0a1628; }

        /* 本文 */
        .fc-body {
            font-size: .87rem; color: #333;
            line-height: 1.85; flex: 1; margin: 0;
        }

        /* 買い目 */
        .fc-bets-wrap {
            background: #f0f4ff;
            border-radius: 6px;
            padding: 10px 14px 12px;
        }
        .fc-bets-label {
            font-size: .7rem; color: #5a6a82;
            display: block; margin-bottom: 4px;
        }
        .fc-bets-text {
            font-size: .84rem; color: #1a4fd6; font-weight: 700;
            font-family: monospace; white-space: pre-wrap;
            line-height: 1.7; margin: 0;
        }
        .fc-bets-total {
            text-align: right; font-size: .78rem;
            color: #5a6a82; margin-top: 6px;
        }
        .fc-bets-total strong { color: #1a4fd6; font-size: .9rem; }

        .pred-msg { text-align: center; padding: 60px 20px; color: #8a9ab2; font-size: .9rem; }

        /* SP */
        @media (max-width: 767px) {
            .pred-wrap { padding: 0 10px 48px; }
            .fc-card, .fc-card.reverse {
                grid-template-columns: 1fr;
            }
            .fc-card.reverse .fc-profile { order: 1; }
            .fc-card.reverse .fc-main    { order: 2; }
            .fc-profile {
                flex-direction: row; text-align: left;
                padding: 14px 16px; flex-wrap: wrap; gap: 12px;
            }
            .fc-avatar { width: 60px; height: 60px; flex-shrink: 0; }
            .fc-avatar-wrap { margin-bottom: 0; }
            .fc-links { flex-direction: row; flex-wrap: wrap; }
            .fc-link-btn { width: auto; flex: 1; min-width: 80px; }
            .fc-desc { display: none; }
            .fc-main { padding: 14px 16px 14px; }
        }
    </style>
</head>
<body>
<div id="site-header"></div>
<div id="page-nav"></div>
<div id="countdown-bar-mount"></div>

<div class="pred-wrap">
    <div class="section-title">予想家の見解</div>
    <p class="pred-intro">認定予想家による公式見解です。各予想家の分析・本命・買い目をご参照ください。</p>
    <div id="fc-list"><div class="pred-msg">読み込み中...</div></div>
</div>

<div id="site-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/common.js"></script>
<script>
const TEAM_DATA = {
    1: { tag:'CR',   name:'Crazy Raccoon',        logo:'assets/images/cr_logo.png' },
    2: { tag:'ZETA', name:'ZETA DIVISION',         logo:'assets/images/zeta_logo.png' },
    3: { tag:'DFM',  name:'DetonatioN FocusMe',    logo:'assets/images/dfm_logo.png' },
    4: { tag:'VRL',  name:'VARREL',                logo:'assets/images/varrel_logo.png' },
    5: { tag:'MRG',  name:'MURASH GAMING',         logo:'assets/images/mrg_logo.png' },
    6: { tag:'RC',   name:'REJECT',                logo:'assets/images/reject_logo.png' },
    7: { tag:'RDL',  name:'RIDDLE',                logo:'assets/images/riddle_logo.png' },
    8: { tag:'LVH',  name:'レバンガ北海道',         logo:'assets/images/levanga_logo.png' },
};

const LINK_ICON = { x: '𝕏', note: '📝', other: '🔗' };

document.addEventListener('DOMContentLoaded', async () => {
    renderLayout();
    try {
        const forecasters = await loadJSON('data/forecasters.json');
        renderForecasters(forecasters);
    } catch(e) {
        console.error(e);
        document.getElementById('fc-list').innerHTML =
            '<div class="pred-msg">データの読み込みに失敗しました。</div>';
    }
});

function renderForecasters(list) {
    if (!list.length) {
        document.getElementById('fc-list').innerHTML =
            '<div class="pred-msg">現在公開中の予想はありません。</div>';
        return;
    }

    document.getElementById('fc-list').innerHTML = list.map((fc, i) => {
        const isReverse = i % 2 === 1;
        const team = TEAM_DATA[fc.prediction.honmei] || {};

        // リンクボタン
        const links = (fc.links || []);
        const linksHtml = links.length ? `
        <div class="fc-links">
            ${links.map(lk => `
            <a class="fc-link-btn type-${escHtml(lk.type || 'other')}"
               href="${escHtml(lk.url)}" target="_blank" rel="noopener">
                <span class="fc-link-icon">${LINK_ICON[lk.type] || '🔗'}</span>
                ${escHtml(lk.label)}
            </a>`).join('')}
        </div>` : '';

        // 本命チップ
        const honmeiHtml = team.tag ? `
        <div class="fc-honmei-row">
            <span class="fc-honmei-label">本命</span>
            <div class="fc-honmei-chip">
                <img class="fc-honmei-logo" src="${escHtml(team.logo)}"
                     alt="${escHtml(team.name)}"
                     onerror="this.style.display='none'">
                <span class="fc-honmei-name">${escHtml(team.name)}</span>
            </div>
        </div>` : '';

        // 買い目
        const totalPt = fc.prediction.total_pt;
        const betsHtml = fc.prediction.bets ? `
        <div class="fc-bets-wrap">
            <span class="fc-bets-label">買い目</span>
            <p class="fc-bets-text">${escHtml(fc.prediction.bets)}</p>
            ${totalPt ? `<div class="fc-bets-total">合計 <strong>${Number(totalPt).toLocaleString()} pt</strong></div>` : ''}
        </div>` : '';

        return `
        <div class="fc-card${isReverse ? ' reverse' : ''}">
            <div class="fc-profile">
                <div class="fc-avatar-wrap">
                    <img class="fc-avatar" src="${escHtml(fc.avatar)}"
                         alt="${escHtml(fc.name)}"
                         onerror="this.style.display='none'">
                    ${fc.badge ? `<span class="fc-badge">${escHtml(fc.badge)}</span>` : ''}
                </div>
                <div>
                    <div class="fc-name">${escHtml(fc.name)}</div>
                    ${fc.title ? `<div class="fc-title-sub">${escHtml(fc.title)}</div>` : ''}
                </div>
                ${fc.description ? `<div class="fc-desc">${escHtml(fc.description)}</div>` : ''}
                ${linksHtml}
            </div>
            <div class="fc-main">
                <p class="fc-pred-title">${escHtml(fc.prediction.title)}</p>
                ${honmeiHtml}
                <p class="fc-body">${escHtml(fc.prediction.body).replace(/\n/g, '<br>')}</p>
                ${betsHtml}
            </div>
        </div>`;
    }).join('');
}

function escHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
    );
}
</script>
</body>
</html>
